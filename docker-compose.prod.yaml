
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment_app_prod
    restart: always
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    env_file:
      - .env.production
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres_db:
    image: postgres:15
    container_name: payment_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # No exponemos el puerto al host en producción
    # ports:
    #   - "5432:5432"
    volumes:
      - payment_db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis_cache:
    image: redis:7-alpine
    container_name: payment_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_prod_password}
    # No exponemos el puerto al host en producción
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_prod_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  payment_db_data_prod: