services:
  app:
    build: .
    container_name: payment_app
    restart: "no"
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_started

  postgres_db:
    image: postgres:15
    container_name: payment_postgres
    restart: "no"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_cache:
    image: redis:7-alpine
    container_name: payment_redis
    restart: "no"
    ports:
      - "6379:6379"

volumes:
  payment_db_data: